version: 1

pathRules:
  - name: default
    paths:
      - src/**
      - package.json
      - tsconfig.json
      - tsup.config.ts
    required:
      - pnpm --filter @pulse-coder/canvas-cli test
      - pnpm --filter @pulse-coder/canvas-cli typecheck

  - name: executable-bundle
    paths:
      - package.json
      - tsup.config.ts
    required:
      - pnpm --filter @pulse-coder/canvas-cli build
