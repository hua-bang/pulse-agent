version: 1

pathRules:
  - name: default
    paths:
      - src/**
      - assets/**
      - manifest.json
      - package.json
      - tsconfig.json
      - vite.config.ts
      - vite.main.config.ts
      - vite.webview.config.ts
    required:
      - pnpm --filter @pulse-canvas/nodes test
      - pnpm --filter @pulse-canvas/nodes typecheck
