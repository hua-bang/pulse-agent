<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <title>Pulse Canvas</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #f8f8f7;
        color: #37352f;
        font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .boot-screen {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f8f7;
      }

      .boot-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        transform: translateY(-2vh);
      }

      .boot-logo {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        box-shadow: 0 10px 26px rgba(55, 53, 47, 0.11);
      }

      .boot-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .boot-status {
        display: flex;
        align-items: center;
        gap: 7px;
        color: rgba(55, 53, 47, 0.56);
        font-size: 12px;
        font-weight: 500;
      }

      .boot-dots {
        display: inline-flex;
        gap: 4px;
      }

      .boot-dots span {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: #2383e2;
        animation: boot-dot 1.1s ease-in-out infinite;
      }

      .boot-dots span:nth-child(2) {
        animation-delay: 0.14s;
      }

      .boot-dots span:nth-child(3) {
        animation-delay: 0.28s;
      }

      @keyframes boot-dot {
        0%,
        80%,
        100% {
          opacity: 0.28;
          transform: translateY(0);
        }

        40% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" aria-label="Pulse Canvas is starting">
        <div class="boot-stack">
          <img class="boot-logo" src="/icon.png" alt="" draggable="false" />
          <div class="boot-title">Pulse Canvas</div>
          <div class="boot-status">
            <span>Preparing workspace</span>
            <span class="boot-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
