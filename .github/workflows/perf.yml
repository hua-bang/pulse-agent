name: Performance

# Every Canvas PR gets the machine-independent bundle gate. The full runtime
# report is reserved for performance-sensitive paths, an explicit
# `performance` PR label, manual dispatch, and pushes to the default branch.
# Timing metrics remain informational because CI runners differ from dev hosts.

on:
  workflow_dispatch:
  pull_request:
    paths: ['apps/canvas-workspace/**', '.github/workflows/perf.yml']
  push:
    branches: [master]
    paths: ['apps/canvas-workspace/**', '.github/workflows/perf.yml']

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.classify.outputs.runtime }}
      packaging: ${{ steps.classify.outputs.packaging }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: classify
        name: Classify performance impact
        shell: bash
        run: |
          runtime=false
          packaging=false

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            runtime=true
            packaging=true
          else
            while IFS= read -r file; do
              case "$file" in
                .github/workflows/perf.yml|apps/canvas-workspace/perf/*|apps/canvas-workspace/scripts/perf/*|apps/canvas-workspace/electron.vite.config.ts|apps/canvas-workspace/src/main/index.ts|apps/canvas-workspace/src/main/app/*|apps/canvas-workspace/src/main/webview/*|apps/canvas-workspace/src/renderer/src/App.tsx|apps/canvas-workspace/src/renderer/src/components/Canvas/*|apps/canvas-workspace/src/renderer/src/components/Workbench/*|apps/canvas-workspace/src/renderer/src/components/IframeNodeBody/*|apps/canvas-workspace/src/renderer/src/components/CanvasNodeView/*|apps/canvas-workspace/src/renderer/src/hooks/*|apps/canvas-workspace/src/renderer/src/perf/*)
                  runtime=true
                  ;;
              esac
              case "$file" in
                .github/workflows/perf.yml|apps/canvas-workspace/package.json|apps/canvas-workspace/electron-builder.*|apps/canvas-workspace/build/*|apps/canvas-workspace/resources/*|apps/canvas-workspace/scripts/perf/package-*|pnpm-lock.yaml)
                  packaging=true
                  ;;
              esac
            done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          fi

          echo "runtime=$runtime" >> "$GITHUB_OUTPUT"
          echo "packaging=$packaging" >> "$GITHUB_OUTPUT"

  bundle:
    if: github.event_name == 'pull_request' && needs.changes.outputs.runtime != 'true' && !contains(github.event.pull_request.labels.*.name, 'performance')
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm run build:core

      - name: Run bundle performance gates
        run: pnpm --filter canvas-workspace perf:report --bundle-only

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-bundle-report
          path: |
            apps/canvas-workspace/perf/out/bundle-report.html
            apps/canvas-workspace/perf/out/bundle-report.json
          if-no-files-found: warn

  perf:
    if: needs.changes.outputs.runtime == 'true' || contains(github.event.pull_request.labels.*.name, 'performance')
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Xvfb (headless display for the Electron app)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Electron binary
        run: pnpm --filter canvas-workspace setup:electron

      # canvas-workspace externalizes pulse-coder-engine + agent-teams
      # (workspace:* deps) — its main process requires their dist/ at runtime,
      # which a fresh checkout doesn't have. Without this the app throws
      # ERR_MODULE_NOT_FOUND on launch and perf:report degrades to bundle-only.
      - name: Build workspace dependencies
        run: pnpm run build:core

      # perf:report builds, runs the bundle gate, launches the app headless
      # (self-managed Xvfb), runs the runtime scenarios, and assembles the
      # report. Exit 1 on any gate failure → this job goes red.
      - name: Run performance report
        run: pnpm --filter canvas-workspace perf:report

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: |
            apps/canvas-workspace/perf/out/dashboard.html
            apps/canvas-workspace/perf/out/report.json
            apps/canvas-workspace/perf/out/renderer-trace-summary.json
            apps/canvas-workspace/perf/out/renderer-trace.json.gz
          if-no-files-found: warn

      - name: Comment verdict on the PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/canvas-workspace/perf/out/report.json';
            if (!fs.existsSync(path)) return;
            const r = JSON.parse(fs.readFileSync(path, 'utf8'));
            const bySev = (s) => r.alerts.filter((a) => a.severity === s);
            const line = (a) => `- **${a.severity.toUpperCase()}** ${a.title}\n  - ${a.evidence}\n  - → ${a.suggestion} \`${a.ref}\``;
            const high = bySev('high');
            const med = bySev('medium');
            const body = [
              '<!-- perf-report -->',
              '### 🚦 性能报告',
              '',
              `**${r.verdict}**`,
              '',
              `核心覆盖 ${r.coverage.measured}/${r.coverage.total} · CDP trace 诊断 ${r.coverage.diagnostic?.measured ?? 0}/${r.coverage.diagnostic?.total ?? 0} · commit \`${r.commit}\``,
              high.length ? '\n#### ⚠ HIGH\n' + high.map(line).join('\n') : '',
              med.length ? '\n#### MEDIUM\n' + med.map(line).join('\n') : '',
              '\n<sub>完整看板见本次运行的 `perf-report` artifact(dashboard.html)。</sub>',
            ].filter(Boolean).join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes('<!-- perf-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }

  # Opt-in (performance label / dispatch): the iframe-heavy load shape real
  # user canvases actually have — the pinned n100/0-webview profile doesn't
  # exercise live-embed cost at all — plus the webview freeze/discard
  # behavior checks that only real Electron guests can answer
  # (docs/performance-verification-large-canvas.md).
  large-canvas:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'performance')
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Xvfb (headless display for the Electron app)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Electron binary
        run: pnpm --filter canvas-workspace setup:electron

      - name: Build workspace dependencies
        run: pnpm run build:core

      # Same pipeline as the perf job but at the 90-node/40-webpage shape.
      # Timing profiles don't match the pinned baseline (rendered 不适用),
      # deterministic counter + bundle gates still apply.
      - name: Run performance report (90 nodes / 40 webpages)
        run: pnpm --filter canvas-workspace perf:report -- --seed-nodes 90 --seed-webpages 40 --repeat 1

      - name: Upload large-canvas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-large-canvas
          path: |
            apps/canvas-workspace/perf/out/dashboard.html
            apps/canvas-workspace/perf/out/report.json
          if-no-files-found: warn

      # Guest-behavior checks in two ISOLATED sessions: freeze/resume runs
      # without a budget override (a tiny budget would let the 30s sweep
      # discard the guest mid-assertion); the discard leg gets its own
      # session with a 1MB budget exported before harness start so main's
      # sweep sees it.
      # Each harness leg gets its own step timeout: the scripts' polls are
      # bounded, but a wedged app boot / CDP pipe would otherwise eat the
      # whole 30-minute job budget (observed once on the discard leg).
      - name: Webview lifecycle behavior check — freeze/resume
        timeout-minutes: 6
        working-directory: apps/canvas-workspace
        run: |
          node harness/tools/driver/cli.mjs start --profile temp --headless
          node scripts/perf/webview-lifecycle-check.mjs
          node harness/tools/driver/cli.mjs close --cleanup

      - name: Webview lifecycle behavior check — L3 discard
        timeout-minutes: 6
        env:
          PULSE_CANVAS_WEBVIEW_MEMORY_BUDGET_MB: 1
          WEBVIEW_CHECK_MODE: discard
        working-directory: apps/canvas-workspace
        run: |
          node harness/tools/driver/cli.mjs start --profile temp --headless
          node scripts/perf/webview-lifecycle-check.mjs
          node harness/tools/driver/cli.mjs close --cleanup

      # Diagnostic only (no gate): deep zoom-out cost on real Electron with
      # mixed inline-iframe + real <webview> embeds — the mid-gesture band
      # the renderer bench can only emulate with same-process iframes.
      - name: Deep zoom gesture probe (diagnostic, grid)
        timeout-minutes: 8
        working-directory: apps/canvas-workspace
        run: |
          node harness/tools/driver/cli.mjs start --profile temp --headless
          node scripts/perf/zoom-gesture-probe.mjs
          node harness/tools/driver/cli.mjs close --cleanup

      # P0 regression baseline for the follow-up zoom-out work: the real
      # 86-node / 40-embed shape (20 url webviews + 20 inline iframes),
      # median over 3 cycles, five split windows + tile-memory counter.
      # continue-on-error while the 20-real-guest load proves stable in CI;
      # it's diagnostic (never gates) and prints an acceptance-line compare.
      - name: Deep zoom gesture probe (diagnostic, large 86/40 baseline)
        timeout-minutes: 12
        continue-on-error: true
        env:
          ZOOM_PROBE_PROFILE: large
          ZOOM_PROBE_REPEAT: '3'
        working-directory: apps/canvas-workspace
        run: |
          node harness/tools/driver/cli.mjs start --profile temp --headless
          node scripts/perf/zoom-gesture-probe.mjs
          node harness/tools/driver/cli.mjs close --cleanup

      - name: Close harness session
        if: always()
        working-directory: apps/canvas-workspace
        run: node harness/tools/driver/cli.mjs close --cleanup || true

      # failure() misses step-timeout cancellation — include cancelled() so
      # a wedged leg still ships its diagnosis.
      - name: Upload harness logs (diagnosis for lifecycle-check failures)
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: large-canvas-harness-logs
          path: apps/canvas-workspace/.harness/runs/
          if-no-files-found: warn

  package-macos-arm64:
    if: needs.changes.outputs.packaging == 'true' || contains(github.event.pull_request.labels.*.name, 'performance')
    needs: changes
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Electron binary
        run: pnpm --filter canvas-workspace setup:electron

      - name: Build workspace dependencies
        run: pnpm run build:core

      - name: Build arm64 package
        run: pnpm --filter canvas-workspace package:mac:arm64
        # Pulse Canvas intentionally uses ad-hoc identity "-" and no signing
        # secrets. electron-builder otherwise skips all signing for PR builds,
        # which would make the strict package signature gate ineffective.
        env:
          CSC_FOR_PULL_REQUEST: "true"

      - name: Evaluate package Gates
        run: pnpm --filter canvas-workspace perf:package

      - name: Upload package report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-package-macos-arm64
          path: apps/canvas-workspace/perf/out/package-report.json
          if-no-files-found: warn
