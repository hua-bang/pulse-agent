version: 1

pathRules:
  # Overlay rules see every changed path repo-wide (the runner matches them
  # against repo-relative paths regardless of workspace ownership).
  - name: harness-data
    paths:
      - harness/**
      - AGENTS.md
      - CLAUDE.md
      - "**/AGENTS.md"
      - "**/harness/**"
      - pnpm-workspace.yaml
    required:
      - node scripts/harness/check-harness.mjs

  - name: harness-visualizer
    paths:
      - harness/skills/visualize-harness/**
    required:
      - pnpm exec vitest run harness/skills/visualize-harness/scripts/render-harness-graph.test.mjs

  - name: harness-runner
    paths:
      - scripts/harness/run-harness-check.mjs
      - scripts/harness/run-harness-check.test.mjs
    required:
      - pnpm exec vitest run scripts/harness/run-harness-check.test.mjs

  - name: root-workspace-config
    paths:
      - package.json
      - pnpm-workspace.yaml
      - tsconfig.json
    required:
      - pnpm run build
      - pnpm test

  # canvas-workspace owns these mirrored canvas-cli contracts; keep its static
  # parity check active when the CLI side changes as well as the app side.
  - name: canvas-cli-contract-parity
    paths:
      - packages/canvas-cli/src/core/types.ts
      - packages/canvas-cli/src/core/storage-v2.ts
    required:
      - node apps/canvas-workspace/harness/tools/describe-canvas.mjs

escalationRules:
  # Reminder-only (printed, never auto-run). The rule NAME must contain the
  # affected workspace's dir slug as a substring — that is how the runner
  # matches. Trigger criteria for each engine class live in
  # packages/engine/harness/validate/README.md; consumer rationale in
  # packages/engine/harness/knowledge/contracts.md "Known Consumers".
  enginePublicApiChange:
    required:
      - pnpm --filter pulse-coder-engine build
      - pnpm --filter pulse-coder-cli test
      - pnpm --filter pulse-coder-agent-teams typecheck
      - pnpm --filter pulse-coder-acp typecheck
      - pnpm --filter pulse-coder-plugin-kit build
      - pnpm --filter pulse-coder-memory-plugin build
      - pnpm --filter pulse-coder-langfuse-plugin build
      - pnpm --filter @pulse-coder/remote-server build
      - pnpm --filter canvas-workspace typecheck

  engineBuiltInPluginChange:
    required:
      - pnpm --filter pulse-coder-engine test
      - pnpm --filter @pulse-coder/remote-server build
      - pnpm --filter canvas-workspace typecheck
      - pnpm --filter pulse-coder-plugin-kit build
      - pnpm --filter pulse-coder-memory-plugin build
      - pnpm --filter pulse-coder-langfuse-plugin build

  engineCoreLoopChange:
    required:
      - pnpm --filter pulse-coder-engine test
      - pnpm --filter pulse-coder-cli test
      - pnpm --filter pulse-coder-agent-teams test
      - pnpm --filter @pulse-coder/remote-server test
      - pnpm --filter canvas-workspace test
      - pnpm --filter pulse-coder-memory-plugin test

  engineToolSchemaChange:
    required:
      - pnpm --filter pulse-coder-engine test
      - pnpm --filter pulse-coder-plugin-kit build
      - pnpm --filter pulse-coder-memory-plugin test
      - pnpm --filter @pulse-coder/remote-server build
      - pnpm --filter canvas-workspace test

  agentTeamsRuntimeProtocolChange:
    required:
      - pnpm --filter @pulse-coder/teams-cli build
      - pnpm --filter canvas-workspace typecheck

  pluginKitPublicApiChange:
    required:
      - pnpm --filter pulse-coder-engine typecheck
      - pnpm --filter @pulse-coder/remote-server build
